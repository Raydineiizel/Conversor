<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght=0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts.js" defer></script>
    <title>Cambio</title>
</head>

<body>

    <img class="logo" src="./assets/logo.gif" alt="logo-cambio">

    <main>

        <label>
            Converter <b>para</b>
            <select class="select-to">
                <option value="BRL">R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>de</b>
            <select class="select-from">
                <option value="USD">$ Dolar Americano</option>
                <option value="EUR">€ Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input type="number" class="input-value" placeholder="7000.00">
        </label>

        <button class="convert-button">
            Converter
        </button>

        <section>

            <div class="currency-box">
                <img src="./assets/Real.svg" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="value-to" class="currency-value">
                    R$ 0,00
                </p>
            </div>

            <img class="arrow-img" src="./assets/seta.svg" alt="logo-seta">

            <div class="currency-box">
                <img id="currency-img-from" src="./assets/dolar.svg" alt="logo-moeda-convertida">
                <p id="currency-name-from" class="currency">Dolar</p>
                <p class="value-from" class="currency-value">
                    US$ 0.00
                </p>
            </div>

        </section>
    </main>
</body>

</html>
