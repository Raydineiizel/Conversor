<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap">
    <link rel="stylesheet" href="style.css">
    <title>Cambio</title>
</head>

<body>

    <img class="logo" src="./assets/logo.gif" alt="logo-cambio">

    <main>
        <label>
            Converter <b>para</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>de</b>
            <select>
                <option>$ Dolar Americano</option>
                <option>€ Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input placeholder="R$ 10.000,00">
        </label>

        <button>
            Converter
        </button>
        
        <section>

            <div class="currency-box">

                <img src="./assets/Real.svg" alt="logo-moeda-a-converter">
                <p class="currency">
                    Real
                </p>
                <p class="currency-value">
                    R$ 0,00
                </p>
            </div>

            <img class="arrow-img" src="./assets/seta.svg" alt="logo-seta">

            <div class="currency-box">

                <img src="./assets/dolar.svg" alt="logo-moeda-convertida">

                <p class="currency" >
                    Dolar
                </p>
                <p class="currency-value">
                    US$ 0.0
                </p>

            </div>

        </section>
    </main>
</body>

</html>
